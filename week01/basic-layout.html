<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micheal o. WDD131</title>
    <link rel="stylesheet" href="styles/layout.css">
</head>
<body>
    <header>
        <h1>Header Content</h1>
        <nav>
            <a href="">Home</a>
            <a href="https://facebook.com">Projects</a>
            <a href="https://facebook.com">Services</a>
            <a href="https://facebook.com">Contact Us</a>

        </nav>
    </header>

    <main>
         <div class="contact-grid">
            <section class="map-location" aria-labelledby="map-info-title">
                <h2 id="map-info-title">Our Location</h2>
                <figure class="map">
                    <iframe title="Micheal Rafting Enterprise Location" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade"
                      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3937.000000000000!2d7.000000!3d4.800000!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0000000000000000%3AMichealRafting!2sPort%20Harcourt!5e0!3m2!1sen!2sNG!4v1700000000000">
                    </iframe>
                    <figcaption>Find us near the Imo River.</figcaption>
                </figure>
            </section>

            <section class="contact-form" aria-labelledby="contact-form-title">
                <h2 id="contact-form-title">Send Us a Message</h2>
                <p>Have a question or suggestion? We'd love to hear from you.</p>

                <form action="#" method="post" class="contact-form__form" novalidate>

                    <div class="form-row">
                        <label for="name">Full Name</label>
                        <input id="name" name="name" type="text" autocomplete="name" required />
                    </div>

        
    </main>

    <footer>
        <p>Footer Content</p>
    </footer>
</body>
</html>
